name: Build & Push Docker Images

on:
  pull_request:
    branches: [master]
    paths:
      - docker-compose.yml
      - backend/**
      - .github/workflows/docker-build.yml
  push:
    branches: [master]
    paths:
      - docker-compose.yml
      - backend/**
      - .github/workflows/docker-build.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create placeholder .env for docker compose
        run: touch .env

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend from docker-compose.yml
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          targets: backend
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            backend.tags=${{ env.IMAGE_NAME }}:latest
            backend.tags=${{ env.IMAGE_NAME }}:${{ github.sha }}
            backend.cache-from=type=gha
            backend.cache-to=type=gha,mode=max
